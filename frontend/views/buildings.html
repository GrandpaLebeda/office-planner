<div class="page-container pt-12">
    
    <div class="top-actions-row items-end">
        <div class="form-group">
            <div class="input-group">
                <span class="form-label mb-0">Název</span>
                <input type="text" id="new-b-name" class="form-input w-64">
            </div>
            <div class="input-group w-48">
                <span class="form-label mb-0 whitespace-nowrap">Počet pater</span>
                <input type="number" id="new-b-floors" class="form-input">
            </div>
            <button onclick="createBuilding()" class="btn btn-primary px-8">Přidat budovu</button>
        </div>
    </div>

    <div class="panel content-panel">
        <h2 class="panel-title mb-8 mt-1">Seznam budov</h2>
        
        <div id="buildings-table" class="list-container custom-scrollbar">
        </div>
    </div>
</div>

<div id="modal-building-settings" class="modal-overlay hidden">
    <div class="modal-content modal-2xl">
        <div class="modal-header">
            <h3>Nastavení budovy</h3>
            <button onclick="closeModal()" class="modal-close">Zavřít &times;</button>
        </div>
        <div class="modal-body">
            <div class="mb-8">
                <label class="form-label">Název budovy</label>
                <input type="text" id="edit-b-name" class="form-input">
            </div>

            <div class="flex flex-col items-start w-full">
                <div class="w-full">
                    <div class="flex items-center gap-4 mb-4 form-label uppercase tracking-wider text-xs">
                        <span class="w-1/3">Patra</span>
                        <span class="flex-1">Kapacita</span>
                    </div>
                    <div id="modal-floors-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                                </div>
                    <button onclick="addFloorToEdit()" class="btn btn-primary mt-6">Přidat patro</button>
                </div>
            </div>
            <div class="mt-12 flex justify-center">
                <button onclick="saveBuildingSettings()" class="btn btn-primary px-16">Uložit</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-delete-confirm" class="modal-overlay z-110 hidden">
    <div class="modal-content modal-sm">
        <div class="modal-delete-body">
            <h3 class="text-xl font-bold text-[#1e293b] m-0">Opravdu chcete smazat tuto budovu?</h3>
            <p class="text-sm text-slate-600 mb-6 m-0">Tato akce je nevratná.</p>

            <div class="modal-delete-actions">
                <button onclick="closeDeleteModal()" class="btn btn-secondary">Zrušit</button>
                <button onclick="confirmDeleteBuilding()" class="btn btn-danger">Smazat</button>
            </div>
        </div>
    </div>
</div>
