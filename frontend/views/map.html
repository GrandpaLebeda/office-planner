<div class="page-container pt-12">
    <div class="flex gap-8 h-full w-full">
        <div class="flex-1 flex flex-col">
        <div class="flex flex-col gap-4 mb-6 mt-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3 w-72">
                    <span class="form-label mb-0 whitespace-nowrap">Vyber budovu</span>
                    <select id="building-selector" onchange="fetchMap()" class="form-input flex-1">
                        <option value="">Načítání...</option>
                    </select>
                </div>
                <div class="flex gap-3">
                    <button onclick="runAutoAllocation()" class="btn btn-primary px-5">
                        Alokovat všechny týmy
                    </button>
                    <button onclick="clearMap()" class="btn btn-danger px-5">
                        Vyčistit mapu
                    </button>
                </div>
            </div>
            
            <div class="flex items-center justify-end gap-6 text-[13px] font-bold text-[#1f2937]">
                <span>Kapacita: <span id="stat-capacity" class="font-medium text-slate-500 ml-1">0</span></span>
                <span>Lidí v týmech: <span id="stat-people" class="font-medium text-slate-500 ml-1">0</span></span>
                <span>Obsazenost: <span id="stat-percent" class="font-medium text-slate-500 ml-1">0%</span></span>
            </div>
        </div>

        <div id="building-container" class="panel flex-1 p-12 overflow-y-auto w-full">
            <div class="text-center py-20 text-slate-400">Vyberte budovu pro zobrazení mapy</div>
        </div>
    </div>

    <div class="w-80 flex flex-col h-full overflow-hidden">
        <div class="panel bg-white flex flex-col h-full border-none p-0">
            <div class="p-6 text-center border-b border-slate-200/50">
                <h3 class="panel-title m-0">Neusazené týmy</h3>
            </div>
            <div id="unassigned-list" class="flex-1 overflow-y-auto p-6 space-y-3 custom-scrollbar">
            </div>
        </div>
    </div>
    </div>
</div>
