<div class="flex gap-8 h-full">
    <div class="flex-1 flex flex-col">
        <!-- Filters & Stats Header -->
        <div class="flex flex-col gap-4 mb-6 mt-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="text-[13px] font-bold text-[#1f2937]">Vyber budovu</span>
                    <select id="building-selector" onchange="fetchMap()" class="bg-white border border-[#cbd5e1] rounded-lg px-3 py-1.5 text-sm font-medium min-w-[180px] shadow-sm outline-none focus:border-blue-500 h-8">
                        <option value="">Načítání...</option>
                    </select>
                </div>
                <div class="flex gap-3">
                    <button onclick="runAutoAllocation()" class="bg-[#2b6be6] hover:bg-blue-700 text-white px-5 py-1.5 rounded-full text-xs font-bold transition-all shadow-md h-8 flex items-center">
                        Alokovat všechny týmy
                    </button>
                    <button onclick="clearMap()" class="bg-[#ff4d4d] hover:bg-red-600 text-white px-5 py-1.5 rounded-full text-xs font-bold transition-all shadow-md h-8 flex items-center">
                        Vyčistit mapu
                    </button>
                </div>
            </div>
            
            <div class="flex items-center justify-end gap-6 text-[13px] font-bold text-[#1f2937]">
                <span>Kapacita: <span id="stat-capacity" class="font-medium text-slate-500 ml-1">0</span></span>
                <span>Lidí v týmech: <span id="stat-people" class="font-medium text-slate-500 ml-1">0</span></span>
                <span>Obsazenost: <span id="stat-percent" class="font-medium text-slate-500 ml-1">0%</span></span>
            </div>
        </div>

        <!-- Building Main View Card -->
        <div id="building-container" class="bg-white rounded-[32px] shadow-sm border border-slate-200/50 flex-1 p-12 overflow-y-auto">
            <!-- Vykreslí se dynamicky -->
            <div class="text-center py-20 text-slate-400">Vyberte budovu pro zobrazení mapy</div>
        </div>
    </div>

    <!-- Right Sidebar: Unassigned Teams -->
    <div class="w-80 flex flex-col h-full overflow-hidden">
        <div class="bg-[#e2e2e2]/40 rounded-[32px] border border-slate-200/50 flex flex-col h-full">
            <div class="p-8 text-center">
                <h3 class="font-bold text-[#1e293b] text-base">Neusazené týmy</h3>
            </div>
            <div id="unassigned-list" class="flex-1 overflow-y-auto px-6 pb-6 space-y-3 custom-scrollbar">
                <!-- Dynamický obsah -->
            </div>
        </div>
    </div>
</div>
