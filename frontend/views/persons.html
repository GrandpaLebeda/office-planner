<div class="page-container pt-12">
    
    <div class="top-actions-row items-center">
        <div class="form-group">
            <div class="input-group">
                <span class="form-label mb-0">Jméno</span>
                <input type="text" id="person-firstname" class="form-input w-48">
            </div>
            <div class="input-group">
                <span class="form-label mb-0">Příjmení</span>
                <input type="text" id="person-surname" class="form-input w-48">
            </div>
            <button onclick="createPerson()" class="btn btn-primary px-5">
                Přidat zaměstnance
            </button>
        </div>
        <div class="relative w-full lg:w-72 flex items-center justify-end gap-3 text-[#2b6be6]">
            <i class="fa-solid fa-search w-4 h-4 text-center"></i>
            <input type="text" id="search-person" placeholder="Vyhledat zaměstnance" oninput="filterPersons()" class="form-input w-64 text-slate-700">
        </div>
    </div>

    <div class="panel content-panel">
        <h2 class="panel-title mb-8 mt-1">Seznam zaměstnanců</h2>

        <div class="list-header list-header-persons mb-4">
            <span>Jméno</span>
            <span>Tým</span>
            <span>Budova</span>
            <span>Patro</span>
            <span></span>
        </div>

        <div id="persons-list" class="list-container custom-scrollbar">
            <div class="list-empty-msg">Načítání zaměstnanců...</div>
        </div>
        
        <div class="absolute right-4 top-16 bottom-16 w-1.5 bg-white/50 rounded-full pointer-events-none hidden md:block"></div>
    </div>
</div>

<div id="modal-delete-person-confirm" class="modal-overlay z-110 hidden">
    <div class="modal-content modal-sm">
        <div class="modal-delete-body">
            <h3 class="text-xl font-bold text-[#1e293b] m-0">Opravdu chcete smazat tohoto zaměstnance?</h3>
            <p class="text-sm text-slate-600 mb-6 m-0">Tato akce je nevratná.</p>
            
            <div class="modal-delete-actions">
                <button onclick="closePersonDeleteModal()" class="btn btn-secondary">
                    Zrušit
                </button>
                <button onclick="confirmDeletePerson()" class="btn btn-danger">
                    Smazat
                </button>
            </div>
        </div>
    </div>
</div>
