<div class="page-container pt-12">
    
    <!-- Top actions row -->
    <div class="flex flex-col lg:flex-row gap-6 mb-8 justify-between items-end lg:items-center w-full">
        <!-- Add Person Form -->
        <div class="flex flex-wrap items-center gap-4 bg-transparent w-full lg:w-auto">
            <div class="flex items-center gap-3">
                <span class="form-label mb-0">Jméno</span>
                <input type="text" id="person-firstname" class="form-input w-48">
            </div>
            <div class="flex items-center gap-3">
                <span class="form-label mb-0">Příjmení</span>
                <input type="text" id="person-surname" class="form-input w-48">
            </div>
            <button onclick="createPerson()" class="btn btn-primary px-5">
                Přidat zaměstnance
            </button>
        </div>

        <!-- Search Form -->
        <div class="relative w-full lg:w-72 flex items-center justify-end gap-3 text-slate-400">
            <i data-lucide="search" class="w-5 h-5 flex-shrink-0"></i>
            <input type="text" id="search-person" placeholder="Vyhledat zaměstnance" oninput="filterPersons()" class="form-input w-64">
        </div>
    </div>

    <!-- Main List Container -->
    <div class="panel content-panel">
        <h2 class="panel-title mb-8 mt-1">Seznam zaměstnanců</h2>

        <!-- Table Header -->
        <div class="grid grid-cols-[3fr_2fr_2fr_2fr_120px] gap-6 px-10 text-[15px] font-bold text-[#1f2937] mb-4 items-center">
            <span>Jméno</span>
            <span>Tým</span>
            <span>Budova</span>
            <span>Patro</span>
            <span></span>
        </div>

        <!-- Scrollable List -->
        <div id="persons-list" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar pb-8">
            <!-- Dynamic rows will be rendered here -->
            <div class="text-center py-20 text-slate-500 font-medium">Načítání zaměstnanců...</div>
        </div>
        
        <!-- Decoration strip on the right side from mockup -->
        <div class="absolute right-4 top-16 bottom-16 w-1.5 bg-white/50 rounded-full pointer-events-none hidden md:block"></div>
    </div>
</div>

<!-- MODAL: DELETE CONFIRMATION -->
<div id="modal-delete-person-confirm" class="modal-overlay hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
    <div class="modal-content max-w-sm animate-in fade-in zoom-in duration-200">
        <div class="p-8 text-center flex flex-col items-center gap-4">
            <h3 class="text-xl font-bold text-[#1e293b] m-0">Opravdu chcete smazat tohoto zaměstnance?</h3>
            <p class="text-sm text-slate-600 mb-6 m-0">Tato akce je nevratná.</p>
            
            <div class="flex gap-4 w-full border-t border-slate-100 pt-6 justify-center">
                <button onclick="closePersonDeleteModal()" class="btn btn-secondary">
                    Zrušit
                </button>
                <button onclick="confirmDeletePerson()" class="btn btn-danger">
                    Smazat
                </button>
            </div>
        </div>
    </div>
</div>
